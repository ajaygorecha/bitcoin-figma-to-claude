<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitcoin — Sign In</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <main class="login-page">
      <div class="blob blob-top-left" aria-hidden="true"></div>
      <div class="blob blob-bottom-right" aria-hidden="true"></div>

      <div class="login-card">
        <div class="login-header">
          <img
            src="assets/images/logo.svg"
            alt="Bitcoin logo"
            class="login-logo"
          />
          <h1 class="login-title">Welcome back!</h1>
        </div>

        <form class="login-form" id="loginForm" novalidate>
          <div class="form-field">
            <label for="email" class="field-label">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="field-input"
              autocomplete="email"
            />
          </div>

          <div class="form-field">
            <label for="password" class="field-label">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="field-input"
              autocomplete="current-password"
            />
          </div>

          <div class="form-options">
            <label class="remember-me" for="rememberMe">
              <input
                type="checkbox"
                id="rememberMe"
                name="rememberMe"
                class="remember-checkbox"
                checked
              />
              <span class="checkbox-custom" aria-hidden="true">
                <i class="ri-check-line"></i>
              </span>
              <span class="remember-label">Remember me</span>
            </label>
            <a href="reset-password.html" class="forgot-link">Forgot Password?</a>
          </div>

          <button type="submit" class="btn-signin">Sign In</button>

          <p class="signup-text">
            Don't have an account?
            <a href="register.html" class="signup-link">Sign Up</a>
          </p>
        </form>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/script.js"></script>
  </body>
</html>

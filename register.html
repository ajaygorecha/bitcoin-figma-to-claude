<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bitcoin — Create Account</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <main class="login-page">
      <div class="blob blob-top-left" aria-hidden="true"></div>
      <div class="blob blob-bottom-right" aria-hidden="true"></div>

      <div class="login-card">
        <div class="login-header">
          <img
            src="assets/images/logo.svg"
            alt="Bitcoin logo"
            class="login-logo"
          />
          <h1 class="login-title">Create account</h1>
        </div>

        <form class="login-form" id="registerForm" novalidate>
          <div class="form-field">
            <label for="fullName" class="field-label">Full Name</label>
            <input
              type="text"
              id="fullName"
              name="fullName"
              class="field-input"
              autocomplete="name"
            />
          </div>

          <div class="form-field">
            <label for="email" class="field-label">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="field-input"
              autocomplete="email"
            />
          </div>

          <div class="form-field">
            <label for="password" class="field-label">Password</label>
            <div class="input-with-icon">
              <input
                type="password"
                id="password"
                name="password"
                class="field-input"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="input-icon-btn"
                aria-label="Toggle password visibility"
                data-target="password"
              >
                <i class="ri-eye-off-line"></i>
              </button>
            </div>
          </div>

          <div class="form-field">
            <label for="confirmPassword" class="field-label">Confirm Password</label>
            <div class="input-with-icon">
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                class="field-input"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="input-icon-btn"
                aria-label="Toggle confirm password visibility"
                data-target="confirmPassword"
              >
                <i class="ri-eye-off-line"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-signin">Sign Up</button>

          <p class="signup-text">
            Already have an account?
            <a href="index.html" class="signup-link">Sign in</a>
          </p>
        </form>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/script.js"></script>
  </body>
</html>
